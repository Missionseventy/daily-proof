<!doctype html>
<html lang="en" data-theme="night">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Daily Proof</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>

<body class="page">
  <header class="topbar">
    <a class="brand" href="./index.html">
      <span class="brandMark">Daily Proof<span class="dot">·</span></span>
    </a>

    <div class="right">
      <button id="themeBtn" class="btn ghost small">Night</button>
      <button id="exportBtn" class="btn ghost small">Export</button>
    </div>
  </header>

  <main class="wrap">
    <section class="card">
      <div class="todayTop">
        <div>
          <div class="kicker">Today</div>
          <div id="todayStr" class="h2"></div>
          <div class="muted small">Your data lives on your device. Always.</div>
        </div>

        <div class="timerBox">
          <div id="timer" class="timer">00:00:00</div>
          <div class="timerBtns">
            <button id="startTimerBtn" class="btn primary">Start</button>
            <button id="resetTimerBtn" class="btn secondary">Reset</button>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Focus block -->
      <div class="sectionHead">
        <div class="h3">Focus</div>
        <button id="toggleFocusBtn" class="btn ghost small">Edit</button>
      </div>

      <div id="focusPills" class="focusPills"></div>
      <div id="focusEmpty" class="muted small">Add today’s focus first.</div>

      <div id="focusEditor" class="focusEditor">
        <div class="row">
          <input id="focusInput" class="input" placeholder="Add a focus…" />
          <button id="addFocusBtn" class="btn secondary">Add</button>
        </div>
        <button id="clearFocusesBtn" class="btn ghost small danger">Clear today</button>
      </div>

      <div class="divider"></div>

      <!-- Proof -->
      <div class="sectionHead">
        <div class="h3">Proof</div>
        <button id="openProofBtn" class="btn primary small">New session</button>
      </div>

      <div id="proofPanel" class="panel">
        <textarea id="entryText" class="textarea" placeholder="Write one honest paragraph…"></textarea>
        <div class="row">
          <button id="saveSessionBtn" class="btn primary">Save</button>
          <button id="closeProofBtn" class="btn ghost">Close</button>
        </div>
      </div>

      <!-- Sessions -->
      <div class="divider"></div>

      <div class="sectionHead">
        <div class="h3">Sessions</div>
        <button id="openSessionsBtn" class="btn ghost small">Sessions</button>
      </div>

      <div id="sessionsPanel" class="panel">
        <div id="savedTime" class="muted small">Saved time today: 0 min</div>
        <div id="sessionsEmpty" class="muted small">No sessions yet.</div>
        <div id="sessionsList" class="sessionsList"></div>
        <div class="row">
          <button id="deleteLastBtn" class="btn ghost small danger">Delete last</button>
          <button id="closeSessionsBtn" class="btn ghost small">Close</button>
        </div>
      </div>
    </section>
  </main>

  <script src="./js/app.js"></script>
</body>
</html>
